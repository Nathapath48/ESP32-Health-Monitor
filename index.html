<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>ESP32 Health Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="topnav">
ESP32 Health Monitor
</div>

<div class="content">

<!-- CONNECT -->

<div class="card-grid">

<div class="card" style="grid-column:1/-1">

<div class="btn-row">

<button id="connectBleButton" class="connectButton">
Connect BLE
</button>

<button id="disconnectBleButton" class="disconnectButton">
Disconnect
</button>

</div>

<p style="margin-top:10px;">
BLE Status:
<strong id="bleState">Disconnected</strong>
</p>

</div>

</div>

<!-- HR / SpO2 -->

<div class="card-grid">

<div class="card">

<h3>❤️ Heart Rate</h3>

<p class="reading" id="hrValue">--</p>

<p class="unit">bpm</p>

</div>

<div class="card">

<h3>🩸 SpO₂</h3>

<p class="reading" id="spo2Value">--</p>

<p class="unit">%</p>

</div>

</div>

<!-- LED + TEMP -->

<div class="card-grid">

<div class="card">

<h3>💡 LED Control</h3>

<div class="btn-row">

<button id="onButton" class="onButton">ON</button>

<button id="offButton" class="offButton">OFF</button>

</div>

</div>

<div class="card">

<h3>🌡 Temperature</h3>

<p class="reading" id="tempValue">--</p>

<p class="unit">°C</p>

</div>

</div>

<!-- DATA LOGGER -->

<div class="card-grid">

<div class="card" style="grid-column:1/-1">

<h3>Data Logger</h3>

<div class="btn-row">

<button id="saveButton" class="saveButton">
Save
</button>

<button id="clearButton" class="clearButton">
Clear
</button>

<button id="downloadButton" class="downloadButton">
Download CSV
</button>

</div>

<p>Records: <span id="recordCount">0</span></p>

<table>

<thead>

<tr>
<th>#</th>
<th>Time</th>
<th>HR</th>
<th>SpO2</th>
<th>Temp</th>
</tr>

</thead>

<tbody id="tableBody">

<tr>
<td colspan="5">No Data</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

/* ELEMENTS */

const connectBtn=document.getElementById("connectBleButton");
const disconnectBtn=document.getElementById("disconnectBleButton");

const onBtn=document.getElementById("onButton");
const offBtn=document.getElementById("offButton");

const saveBtn=document.getElementById("saveButton");
const downloadBtn=document.getElementById("downloadButton");
const clearBtn=document.getElementById("clearButton");

const hrValue=document.getElementById("hrValue");
const spo2Value=document.getElementById("spo2Value");
const tempValue=document.getElementById("tempValue");

const tableBody=document.getElementById("tableBody");
const recordCount=document.getElementById("recordCount");

const bleState=document.getElementById("bleState");

/* UUID */

const deviceName="ntp";

const serviceUUID="19b10000-e8f2-537e-4f6c-d104768a1214";

const tempUUID="19b10001-e8f2-537e-4f6c-d104768a1214";

const ledUUID="19b10002-e8f2-537e-4f6c-d104768a1214";

const hrUUID="19b10003-e8f2-537e-4f6c-d104768a1214";

const spo2UUID="19b10004-e8f2-537e-4f6c-d104768a1214";

/* STATE */

let bleDevice=null;
let bleServer=null;
let bleService=null;

let records=[];

/* BUTTON EVENTS */

connectBtn.onclick=connectBLE;
disconnectBtn.onclick=disconnectBLE;

onBtn.onclick=()=>{
writeLED(1);
onBtn.classList.add("active");
offBtn.classList.remove("active");
}

offBtn.onclick=()=>{
writeLED(0);
offBtn.classList.add("active");
onBtn.classList.remove("active");
}

saveBtn.onclick=saveRecord;
downloadBtn.onclick=downloadCSV;
clearBtn.onclick=clearRecords;

/* CONNECT */

async function connectBLE(){

try{

bleDevice=await navigator.bluetooth.requestDevice({

filters:[{name:deviceName}],

optionalServices:[serviceUUID]

});

bleServer=await bleDevice.gatt.connect();

bleService=await bleServer.getPrimaryService(serviceUUID);

bleState.textContent="Connected";

/* HR */

const hrChar=await bleService.getCharacteristic(hrUUID);

hrChar.addEventListener("characteristicvaluechanged",e=>{

hrValue.textContent=new TextDecoder().decode(e.target.value);

});

await hrChar.startNotifications();

/* SpO2 */

const spo2Char=await bleService.getCharacteristic(spo2UUID);

spo2Char.addEventListener("characteristicvaluechanged",e=>{

spo2Value.textContent=new TextDecoder().decode(e.target.value);

});

await spo2Char.startNotifications();

/* Temp */

const tempChar=await bleService.getCharacteristic(tempUUID);

tempChar.addEventListener("characteristicvaluechanged",e=>{

tempValue.textContent=new TextDecoder().decode(e.target.value);

});

await tempChar.startNotifications();

}catch(err){

console.log(err);
bleState.textContent="Disconnected";

}

}

/* LED */

async function writeLED(val){

if(!bleService) return;

try{

const char=await bleService.getCharacteristic(ledUUID);

await char.writeValue(new Uint8Array([val]));

}catch(err){

console.log(err);

}

}

/* DISCONNECT */

function disconnectBLE(){

if(bleDevice && bleDevice.gatt.connected){

bleDevice.gatt.disconnect();

bleState.textContent="Disconnected";

}

}

/* SAVE */

function saveRecord(){

const hr=hrValue.textContent;
const spo2=spo2Value.textContent;
const temp=tempValue.textContent;

if(hr==="--") return;

const time=new Date().toLocaleString();

records.push({time,hr,spo2,temp});

updateTable();

}

/* TABLE */

function updateTable(){

recordCount.textContent=records.length;

tableBody.innerHTML="";

records.forEach((r,i)=>{

const row=document.createElement("tr");

row.innerHTML=`

<td>${i+1}</td>
<td>${r.time}</td>
<td>${r.hr}</td>
<td>${r.spo2}</td>
<td>${r.temp}</td>

`;

tableBody.appendChild(row);

});

}

/* CSV */

function downloadCSV(){

if(records.length===0) return;

const header="No,Time,HR,SpO2,Temp\n";

const rows=records.map((r,i)=>

`${i+1},${r.time},${r.hr},${r.spo2},${r.temp}`

).join("\n");

const blob=new Blob([header+rows],{type:"text/csv"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;

a.download="health_data.csv";

a.click();

}

/* CLEAR */

function clearRecords(){

records=[];

recordCount.textContent=0;

tableBody.innerHTML="<tr><td colspan='5'>No Data</td></tr>";

}

</script>

</body>
</html>
